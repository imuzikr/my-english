<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Git 버전 관리 흐름 인포그래픽</title>
<meta name="description" content="깃을 이용한 버전 관리의 흐름을 아주 간단하게 나타낸 인포그래픽">
<link rel="manifest" href="/my-english/manifest.json">
<meta name="theme-color" content="#3b82f6">
<style>
:root{
  --bg:#f5f2ed; --paper:#fffaf3; --ink:#1f2937; --muted:#667085;
  --line:#d8d2c7; --accent:#d95f2b; --accent-soft:#faeee7;
  --blue:#2d5a8e; --blue-soft:#e5eef7; --green:#3a6b4a; --green-soft:#e6f0e9;
  --yellow:#8a6a00; --yellow-soft:#fdf5d9; --radius:22px;
  --font:-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{min-height:100vh;background:var(--bg);color:var(--ink);font-family:var(--font);line-height:1.6;padding:28px}
.wrap{max-width:1080px;margin:0 auto}
.hero{background:#2c2a26;color:#f5f2ed;border-radius:28px;padding:34px 34px 30px;box-shadow:0 18px 50px rgba(31,41,55,.14)}
.badge{display:inline-block;color:#ffb088;background:rgba(217,95,43,.18);font-size:12px;font-weight:800;letter-spacing:.12em;text-transform:uppercase;padding:5px 12px;border-radius:999px;margin-bottom:14px}
h1{font-size:clamp(30px,5vw,54px);line-height:1.06;letter-spacing:-.04em;margin-bottom:12px}
.lead{max-width:720px;color:#d9d5cc;font-size:18px}.lead strong{color:#fff}
.card{margin-top:22px;background:var(--paper);border:1px solid var(--line);border-radius:28px;padding:26px;box-shadow:0 10px 28px rgba(31,41,55,.08)}
svg{width:100%;height:auto;display:block}.step-title{font-size:24px;font-weight:850;fill:#1f2937}.step-desc{font-size:16px;fill:#667085}.cmd{font-size:15px;font-weight:800;fill:#d95f2b}.small{font-size:14px;fill:#667085}.num{font-size:18px;font-weight:900;fill:#fff}
.legend{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-top:18px}.legend div{background:#fff;border:1px solid var(--line);border-radius:16px;padding:14px;font-size:14px;color:var(--muted)}.legend strong{display:block;color:var(--ink);font-size:15px;margin-bottom:2px}
.summary{margin-top:16px;background:#fff;border:1px solid var(--line);border-radius:20px;padding:18px 20px;color:var(--muted)}.summary b{color:var(--ink)}
@media(max-width:760px){body{padding:14px}.hero,.card{border-radius:22px;padding:22px}.legend{grid-template-columns:1fr}.lead{font-size:16px}}
</style>
</head>
<body>
<div class="wrap">
  <section class="hero">
    <span class="badge">Git Flow</span>
    <h1>깃 버전 관리,<br>이 5단계로 끝!</h1>
    <p class="lead">파일을 고치고 → 담고 → 저장하고 → 올리면, <strong>GitHub와 배포</strong>까지 자연스럽게 이어집니다.</p>
  </section>

  <section class="card" aria-label="깃 버전 관리 흐름 인포그래픽">
    <svg viewBox="0 0 1040 560" role="img" aria-labelledby="title desc" xmlns="http://www.w3.org/2000/svg">
      <title id="title">Git version control flow</title>
      <desc id="desc">작업 폴더, 스테이징, 커밋, 푸시, 깃허브 배포 순서의 간단한 흐름도</desc>
      <defs>
        <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#b8b5ac"/></marker>
        <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#1f2937" flood-opacity=".12"/></filter>
      </defs>

      <rect x="0" y="0" width="1040" height="560" rx="28" fill="#fffaf3"/>
      <path d="M148 230 C220 160 300 160 372 230 S524 300 596 230 S748 160 820 230" fill="none" stroke="#dedad2" stroke-width="10" stroke-linecap="round" marker-end="url(#arrow)"/>
      <path d="M820 332 C738 414 572 430 490 360" fill="none" stroke="#dedad2" stroke-width="6" stroke-linecap="round" stroke-dasharray="14 12" marker-end="url(#arrow)"/>

      <g filter="url(#shadow)">
        <rect x="42" y="154" width="188" height="178" rx="24" fill="#ffffff" stroke="#dedad2"/>
        <circle cx="76" cy="190" r="20" fill="#2d5a8e"/><text x="76" y="197" text-anchor="middle" class="num">1</text>
        <text x="76" y="236" class="step-title">수정</text>
        <text x="76" y="268" class="step-desc">파일을 고쳐요</text>
        <text x="76" y="296" class="small">Working Tree</text>
      </g>

      <g filter="url(#shadow)">
        <rect x="250" y="154" width="188" height="178" rx="24" fill="#ffffff" stroke="#dedad2"/>
        <circle cx="284" cy="190" r="20" fill="#d95f2b"/><text x="284" y="197" text-anchor="middle" class="num">2</text>
        <text x="284" y="236" class="step-title">담기</text>
        <text x="284" y="268" class="cmd">git add</text>
        <text x="284" y="296" class="small">Staging Area</text>
      </g>

      <g filter="url(#shadow)">
        <rect x="458" y="154" width="188" height="178" rx="24" fill="#ffffff" stroke="#dedad2"/>
        <circle cx="492" cy="190" r="20" fill="#3a6b4a"/><text x="492" y="197" text-anchor="middle" class="num">3</text>
        <text x="492" y="236" class="step-title">저장</text>
        <text x="492" y="268" class="cmd">git commit</text>
        <text x="492" y="296" class="small">Local Repository</text>
      </g>

      <g filter="url(#shadow)">
        <rect x="666" y="154" width="188" height="178" rx="24" fill="#ffffff" stroke="#dedad2"/>
        <circle cx="700" cy="190" r="20" fill="#8a6a00"/><text x="700" y="197" text-anchor="middle" class="num">4</text>
        <text x="700" y="236" class="step-title">올리기</text>
        <text x="700" y="268" class="cmd">git push</text>
        <text x="700" y="296" class="small">Remote로 전송</text>
      </g>

      <g filter="url(#shadow)">
        <rect x="874" y="154" width="124" height="178" rx="24" fill="#e5eef7" stroke="#cad9eb"/>
        <circle cx="908" cy="190" r="20" fill="#2d5a8e"/><text x="908" y="197" text-anchor="middle" class="num">5</text>
        <text x="908" y="236" class="step-title">공유</text>
        <text x="908" y="268" class="step-desc">GitHub</text>
        <text x="908" y="296" class="small">Actions 배포</text>
      </g>

      <rect x="312" y="388" width="416" height="88" rx="22" fill="#faeee7" stroke="#f2d3c2"/>
      <text x="520" y="424" text-anchor="middle" class="step-title">다른 곳에서 바뀌었다면?</text>
      <text x="520" y="454" text-anchor="middle" class="cmd">git pull</text>
      <text x="520" y="482" text-anchor="middle" class="small">GitHub의 최신 변경을 내 작업 폴더로 가져와요</text>

      <text x="520" y="82" text-anchor="middle" style="font-size:22px;font-weight:850;fill:#1f2937">수정 → add → commit → push → GitHub/배포</text>
      <text x="520" y="112" text-anchor="middle" style="font-size:15px;fill:#667085">핵심은 “작업 중인 파일”과 “저장된 버전”을 구분하는 것입니다.</text>
    </svg>

    <div class="legend">
      <div><strong>수정</strong>내 컴퓨터에서 파일을 바꾸는 단계</div>
      <div><strong>add</strong>이번 버전에 넣을 변경만 고르는 단계</div>
      <div><strong>commit</strong>설명 메시지와 함께 스냅샷을 저장</div>
      <div><strong>push</strong>GitHub에 올려 공유·배포로 연결</div>
    </div>

    <p class="summary"><b>한 줄 요약:</b> “고친 파일을 고르고(add), 내 컴퓨터에 버전으로 저장(commit), GitHub에 올린다(push).”</p>
  </section>
</div>
</body>
</html>
